[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests", "eval"]
markers = [
    "eval: end-to-end evaluation tests requiring Qdrant and LLM (deselect with -m 'not eval')",
]
asyncio_mode = "auto"
